site_name: Digital Audio Effects Cookbook
site_url: https://pdx-cs-sound.github.io/effects-cookbook/
docs_dir: prototype

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:
      check_paths: true
  - tables
  - toc:
      permalink: true

nav:
  - "1 — Introduction": index.md
  - "2 — Measuring sound": conventions.md
  - "3 — Single-sample effects": single-sample.md
  - "4 — Waveforms & envelopes": waveforms.md
  - "5 — Time domain: level":
      - Tremolo: tremolo.md
      - Compression: compression.md
      - "Designing a compressor": compressor-design.md
      - Limiting: limiter.md
      - Expanding: expander.md
      - Automatic Gain Control: agc.md
  - "6 — Delay & modulation": delay-modulation.md
  - "7 — The frequency domain": frequency-domain.md
  - "8 — Filters": filters.md
  - "9 — DFT, FFT, STFT": transforms.md
  - "10 — Frequency-domain effects": frequency-effects.md
  - Appendix:
      - "Status & scope": status.md
      - References: references.md
      - Visualizations: visualizations.md
