site_name: Digital Audio Effects Cookbook
site_url: https://pdx-cs-sound.github.io/effects-cookbook/
docs_dir: prototype

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

nav:
  - "1 — Introduction": index.md
  - "2 — Measuring sound": conventions.md
  - "3 — Single-sample effects": single-sample.md
  - "4 — Waveforms & oscillators": waveforms.md
  - "5 — Envelopes & tremolo":
      - Envelopes: envelopes.md
      - Tremolo: tremolo.md
  - "6 — Companding":
      - Compression: compression.md
      - Limiting: limiter.md
      - Expanding: expander.md
      - Automatic Gain Control: agc.md
  - "7 — Delay & modulation": delay-modulation.md
  - "8 — The frequency domain": frequency-domain.md
  - "9 — Filters": filters.md
  - "10 — DFT, FFT, STFT": transforms.md
  - "11 — Frequency-domain effects": frequency-effects.md
  - Appendix:
      - "Status & scope": status.md
      - References: references.md
      - Visualizations: visualizations.md

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
