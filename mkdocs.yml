site_name: Digital Audio Effects Cookbook
docs_dir: prototype

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

nav:
  - "Chapter 1 — Conventions & AGC":
      - Conventions: conventions.md
      - Automatic Gain Control: agc.md
  - "Chapter 2 — Companding":
      - Compression: compression.md
