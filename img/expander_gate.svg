<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="Expander closing on the quiet parts">
<title>Expander closing on the quiet parts</title>
<desc>Two loud bursts over a -45 dBFS bleed floor, through the book's expander at 3:1 below a -35 dBFS threshold. Between bursts the expander pushes the bleed down by its full range; it opens quickly when a burst arrives (5 ms attack) and closes slowly after it ends (100 ms release). The output is bold only while the expander is attenuating.</desc>
