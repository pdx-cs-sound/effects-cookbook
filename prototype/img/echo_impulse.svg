<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-label="Echo: impulse response">
<title>Echo: impulse response</title>
<desc>A single impulse into an echo with 250 ms delay, feedback 0.6, and mix 0.5. The dry impulse passes through at time zero, and each later tap is the previous tap times the feedback factor, a geometric decay.</desc>
<g stroke="#888780" stroke-opacity="0.25" stroke-width="1">
<line x1="46.0" y1="286" x2="46.0" y2="14"/>
<line x1="122.7" y1="286" x2="122.7" y2="14"/>
<line x1="199.3" y1="286" x2="199.3" y2="14"/>
<line x1="276.0" y1="286" x2="276.0" y2="14"/>
<line x1="352.7" y1="286" x2="352.7" y2="14"/>
<line x1="429.3" y1="286" x2="429.3" y2="14"/>
<line x1="506.0" y1="286" x2="506.0" y2="14"/>
<line x1="46" y1="286.0" x2="506" y2="286.0"/>
<line x1="46" y1="236.5" x2="506" y2="236.5"/>
<line x1="46" y1="187.1" x2="506" y2="187.1"/>
<line x1="46" y1="137.6" x2="506" y2="137.6"/>
<line x1="46" y1="88.2" x2="506" y2="88.2"/>
<line x1="46" y1="38.7" x2="506" y2="38.7"/>
</g>
<g fill="#888780" font-size="11" font-family="system-ui, sans-serif">
<text x="46.0" y="302" text-anchor="middle">0.00</text>
<text x="122.7" y="302" text-anchor="middle">0.25</text>
<text x="199.3" y="302" text-anchor="middle">0.50</text>
<text x="276.0" y="302" text-anchor="middle">0.75</text>
<text x="352.7" y="302" text-anchor="middle">1.00</text>
<text x="429.3" y="302" text-anchor="middle">1.25</text>
<text x="506.0" y="302" text-anchor="middle">1.50</text>
<text x="40" y="289.0" text-anchor="end">0.0</text>
<text x="40" y="239.5" text-anchor="end">0.1</text>
<text x="40" y="190.1" text-anchor="end">0.2</text>
<text x="40" y="140.6" text-anchor="end">0.3</text>
<text x="40" y="91.2" text-anchor="end">0.4</text>
<text x="40" y="41.7" text-anchor="end">0.5</text>
<text x="276.0" y="316" text-anchor="middle">time (s)</text>
<text x="13" y="150.0" text-anchor="middle" transform="rotate(-90 13 150.0)">amplitude (linear)</text>
</g>
<polyline points="46.0,286.0 46.0,38.7" fill="none" stroke="#888780" stroke-width="2.6"/>
<polyline points="122.7,286.0 122.7,38.7" fill="none" stroke="#378add" stroke-width="2.6"/>
<polyline points="199.3,286.0 199.3,137.6" fill="none" stroke="#378add" stroke-width="2.6"/>
<polyline points="276.0,286.0 276.0,197.0" fill="none" stroke="#378add" stroke-width="2.6"/>
<polyline points="352.7,286.0 352.7,232.6" fill="none" stroke="#378add" stroke-width="2.6"/>
<polyline points="429.3,286.0 429.3,254.0" fill="none" stroke="#378add" stroke-width="2.6"/>
<line x1="266" y1="30" x2="286" y2="30" stroke="#888780" stroke-width="2.6"/>
<text x="292" y="33.5" fill="#888780" font-size="11" font-family="system-ui, sans-serif">dry impulse, through the mix</text>
<line x1="266" y1="45" x2="286" y2="45" stroke="#378add" stroke-width="2.6"/>
<text x="292" y="48.5" fill="#888780" font-size="11" font-family="system-ui, sans-serif">echo taps, each 0.6 × the last</text>
</svg>
