<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="The phase accumulator">
<title>The phase accumulator</title>
<desc>A phase value climbs from 0 to 1 and wraps, twice; the wrap is drawn as a gap. The sawtooth is the same ramp rescaled to plus or minus 1, and the square is plus 1 while the phase is below one half. A dashed reference line marks phase equals one half.</desc>
