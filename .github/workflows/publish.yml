name: Publish docs
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python3 -m unittest discover -s code
      - run: mkdocs build
      - run: python3 code/check_embeds.py
      - run: mkdocs gh-deploy --force